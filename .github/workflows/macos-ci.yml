name: macOS sanity check

on:
  push:
    branches:
      - main
      - macos-metal-support
  pull_request:
    branches:
      - main
      - macos-metal-support

permissions:
  contents: read

jobs:
  macos-sanity:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.1

      - name: Set up Python 3.9
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.9"

      - name: Install core dependencies (torch, pytorch-lightning, navsim)
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.0.1 torchvision==0.15.2 pytorch-lightning==2.2.1
          pip install hydra-core==1.2.0 omegaconf
          pip install -e . --no-deps

      - name: Import sanity check
        run: |
          python - <<'EOF'
          import torch
          import pytorch_lightning

          # This mirrors the CPU-fallback branch every non-Mac user already
          # exercises. On a GitHub-hosted macOS runner there is no real GPU
          # passthrough, so torch.backends.mps.is_available() is expected to
          # be False here -- we only assert that the check itself doesn't
          # raise, not that MPS is actually available.
          mps_available = torch.backends.mps.is_available()
          device = torch.device("mps") if mps_available else torch.device("cpu")
          print(f"torch={torch.__version__} pytorch_lightning={pytorch_lightning.__version__} "
                f"mps_available={mps_available} device={device}")

          # Only the top-level packages are imported here (not e.g.
          # navsim.agents.abstract_agent), since the concrete agent/common
          # submodules transitively require nuplan-devkit and its heavy
          # geopandas/Fiona/rasterio stack, which this workflow deliberately
          # does not install (see the install step above). The top-level
          # __init__.py files are lightweight, so this still catches basic
          # packaging/import breakage.
          import navsim
          import navsim.agents
          import navsim.common
          import navsim.planning

          print("navsim top-level package imports OK")
          EOF

      - name: Static regression guard on MPS/CUDA device routing in abstract_agent.py
        run: |
          python - <<'EOF'
          import re

          path = "navsim/agents/abstract_agent.py"
          with open(path) as f:
            source = f.read()

          # Guard against re-introducing a platform-only assumption: the file must
          # still branch on both CUDA and MPS availability (cuda > mps > cpu
          # priority), not hardcode a single accelerator.
          assert "torch.backends.mps" in source, (
            f"{path} no longer references torch.backends.mps -- "
            "macOS/Apple Silicon inference routing may have been reverted."
          )
          assert "torch.cuda.is_available" in source, (
            f"{path} no longer checks torch.cuda.is_available -- "
            "CUDA users may be silently forced onto CPU/MPS."
          )
          assert not re.search(r'torch\.device\(\s*["\'](cuda|mps)["\']\s*\)\s*if', source) or (
            "torch.cuda.is_available" in source and "torch.backends.mps.is_available" in source
          ), (
            f"{path} appears to hardcode a single accelerator without checking "
            "both CUDA and MPS availability."
          )

          print(f"{path} still contains CUDA/MPS-aware device selection")
          EOF

      - name: Static regression guard on macOS training platform config group
        run: |
          test -f navsim/planning/script/config/training/platform/cuda.yaml
          test -f navsim/planning/script/config/training/platform/mps.yaml
          python - <<'EOF'
          import yaml

          for name in ("cuda", "mps"):
            path = f"navsim/planning/script/config/training/platform/{name}.yaml"
            with open(path) as f:
              cfg = yaml.safe_load(f)
            assert "trainer" in cfg and "params" in cfg["trainer"], f"{path} missing trainer.params"
            assert "accelerator" in cfg["trainer"]["params"], f"{path} missing trainer.params.accelerator"

          print("platform/cuda.yaml and platform/mps.yaml both define trainer.params.accelerator")
          EOF

      - name: Verify platform=mps Hydra override resolves correctly
        run: |
          python - <<'EOF'
          from hydra import compose, initialize_config_module

          with initialize_config_module(config_module="navsim.planning.script.config.training", version_base=None):
            cfg = compose(config_name="default_training", overrides=["train_test_split=navtrain", "platform=mps"])
            assert cfg.trainer.params.accelerator == "mps"
            assert cfg.trainer.params.strategy == "auto"
            assert cfg.trainer.params.precision == "32-true"
            assert cfg.dataloader.params.pin_memory is False

            cfg_default = compose(config_name="default_training", overrides=["train_test_split=navtrain"])
            assert cfg_default.trainer.params.accelerator == "gpu", (
              "default (no platform override) must stay CUDA-oriented for existing users"
            )

          print("platform=mps and default (cuda) Hydra overrides both resolve as expected")
          EOF

      - name: Lint macOS-relevant training scripts (bash -n)
        run: |
          bash -n scripts/training/run_transfuser_training.sh
          bash -n scripts/training/run_ego_mlp_agent_training.sh
          bash -n scripts/check_macos_setup.sh

      - name: Lint macOS-relevant training scripts (shellcheck)
        # Non-blocking: these are short (~10 line), human-reviewed scripts with no
        # loops/arrays/user input, so the blast radius of a missed shellcheck finding
        # is low, and this avoids `brew install shellcheck` flakiness blocking merges.
        continue-on-error: true
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            brew install shellcheck
          fi
          shellcheck scripts/training/run_transfuser_training.sh
          shellcheck scripts/training/run_ego_mlp_agent_training.sh
          shellcheck scripts/check_macos_setup.sh
